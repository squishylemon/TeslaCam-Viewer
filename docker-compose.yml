# Pull pre-built images (default). Developers: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# Compose loads .env automatically for ${TESLACAM_*_IMAGE} substitution.
# setup.sh / setup.ps1 copy config.env -> .env on each run (no --env-file needed).
# Containers still read config.env via env_file below.

services:
  db:
    image: postgres:16-alpine
    container_name: teslacam-db
    environment:
      POSTGRES_USER: teslacam
      POSTGRES_PASSWORD: teslacam
      POSTGRES_DB: teslacam
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U teslacam -d teslacam']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  sftp-init:
    image: ${TESLACAM_SFTP_INIT_IMAGE:-ghcr.io/squishylemon/teslacam-sftp-init:latest}
    container_name: teslacam-sftp-init
    network_mode: host
    env_file: config.env
    environment:
      SFTP_CONFIG_DIR: /config
    volumes:
      - sftpconfig:/config
    restart: 'no'

  sftp:
    image: ${TESLACAM_SFTP_IMAGE:-ghcr.io/squishylemon/teslacam-sftp:latest}
    container_name: teslacam-sftp
    depends_on:
      sftp-init:
        condition: service_completed_successfully
    network_mode: host
    env_file: config.env
    environment:
      SFTP_CONFIG_DIR: /config
    volumes:
      - sftpconfig:/config:ro
      - teslacam:/home/teslacam/upload
    restart: unless-stopped

  host-mdns:
    image: ${TESLACAM_HOST_MDNS_IMAGE:-ghcr.io/squishylemon/teslacam-host-mdns:latest}
    container_name: teslacam-host-mdns
    network_mode: host
    env_file: config.env
    restart: unless-stopped

  mdns:
    profiles: [avahi]
    image: ${TESLACAM_MDNS_IMAGE:-ghcr.io/squishylemon/teslacam-mdns:latest}
    container_name: teslacam-mdns
    network_mode: host
    env_file: config.env
    depends_on:
      sftp-init:
        condition: service_completed_successfully
      web:
        condition: service_started
    restart: unless-stopped

  # SMB library mounts need mount.cifs + capset (DAC_READ_SEARCH) inside the container.
  web:
    image: ${TESLACAM_WEB_IMAGE:-ghcr.io/squishylemon/teslacam-web:latest}
    container_name: teslacam-viewer
    cap_add:
      - SYS_ADMIN
      - DAC_READ_SEARCH
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    depends_on:
      db:
        condition: service_healthy
      sftp-init:
        condition: service_completed_successfully
    ports:
      - '${WEB_PORT:-4321}:4321'
    env_file: config.env
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      TESLACAM_DIR: /data/TeslaCam
      SFTP_CONFIG_DIR: /app/data/sftp
      DATABASE_URL: postgres://teslacam:teslacam@db:5432/teslacam
      BRANDING_DIR: /app/data/branding
      # USE_HTTPS comes from config.env only (do not override here or HTTPS breaks)
    volumes:
      - teslacam:/data/TeslaCam
      - branding:/app/data/branding
      - sftpconfig:/app/data/sftp
      - webtls:/app/data/tls
      - library_mounts:/app/data/libraries
    restart: unless-stopped

volumes:
  pgdata:
  teslacam:
  branding:
  sftpconfig:
  library_mounts:
  webtls:
