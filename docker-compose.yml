# Requires config.env (copy from config.env.example and set LAN_IP).
services:
  db:
    image: postgres:16-alpine
    container_name: teslacam-db
    environment:
      POSTGRES_USER: teslacam
      POSTGRES_PASSWORD: teslacam
      POSTGRES_DB: teslacam
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U teslacam -d teslacam']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  sftp-init:
    build: ./docker/sftp-init
    container_name: teslacam-sftp-init
    network_mode: host
    env_file: config.env
    environment:
      SFTP_CONFIG_DIR: /config
    volumes:
      - sftpconfig:/config
    restart: 'no'

  sftp:
    build: ./docker/sftp
    container_name: teslacam-sftp
    depends_on:
      sftp-init:
        condition: service_completed_successfully
    network_mode: host
    env_file: config.env
    environment:
      SFTP_CONFIG_DIR: /config
    volumes:
      - sftpconfig:/config:ro
      - teslacam:/home/teslacam/upload
    restart: unless-stopped

  # Optional Linux-only Avahi (Windows/Mac use host-mdns from setup.ps1 / setup.sh instead).
  mdns:
    profiles: [avahi]
    build: ./docker/avahi
    container_name: teslacam-mdns
    network_mode: host
    env_file: config.env
    depends_on:
      sftp-init:
        condition: service_completed_successfully
      web:
        condition: service_started
    restart: unless-stopped

  web:
    build: .
    container_name: teslacam-viewer
    depends_on:
      db:
        condition: service_healthy
      sftp-init:
        condition: service_completed_successfully
    ports:
      - '${WEB_PORT:-4321}:4321'
    env_file: config.env
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      TESLACAM_DIR: /data/TeslaCam
      SFTP_CONFIG_DIR: /app/data/sftp
      DATABASE_URL: postgres://teslacam:teslacam@db:5432/teslacam
      BRANDING_DIR: /app/data/branding
      USE_HTTPS: ${USE_HTTPS:-false}
    volumes:
      - teslacam:/data/TeslaCam
      - branding:/app/data/branding
      - sftpconfig:/app/data/sftp
      - webtls:/app/data/tls
    restart: unless-stopped

volumes:
  pgdata:
  teslacam:
  branding:
  sftpconfig:
  webtls:
