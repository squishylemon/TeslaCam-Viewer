name: Create release

# Publishes a GitHub Release with a deploy zip (docker-compose + setup scripts only).
# Create a release: git tag v1.0.0 && git push origin v1.0.0

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw="manual-${GITHUB_SHA::7}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            raw="${GITHUB_REF#refs/tags/}"
          else
            raw="${GITHUB_REF#refs/heads/}"
          fi
          safe="$(echo "$raw" | tr '/ ' '-' | tr -cd '[:alnum:]._-')"
          echo "tag=${safe}" >> "$GITHUB_OUTPUT"

      - name: Build deploy zip
        env:
          VERSION: ${{ steps.ver.outputs.tag }}
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          root="release-bundle"
          rm -rf "$root"
          mkdir -p "$root"

          cp docker-compose.yml "$root/"
          cp config.env.example "$root/"
          cp setup.ps1 "$root/"
          cp setup.sh "$root/"
          cp deploy/README.md "$root/README.md"

          sed -i "s/YOUR_GITHUB_USER/${GHCR_OWNER}/g" "$root/config.env.example"
          chmod +x "$root/setup.sh"

          zip_name="teslacam-viewer-${VERSION}.zip"
          (cd "$root" && zip -r "../${zip_name}" .)
          echo "ZIP_NAME=${zip_name}" >> "$GITHUB_ENV"
          ls -la "$zip_name"

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: TeslaCam Viewer ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}

      - name: Upload zip artifact (non-tag runs)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: teslacam-viewer-deploy-bundle
          path: ${{ env.ZIP_NAME }}
