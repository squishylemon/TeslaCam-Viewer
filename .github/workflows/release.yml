name: Create release

# Publishes a GitHub Release with a deploy zip (docker-compose + setup scripts only).
# Create a release: git tag v1.0.0 && git push origin v1.0.0

on:
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: rel
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            raw="${GITHUB_REF#refs/tags/}"
            needs_auto_tag=false
            should_release=true
          elif [[ "$GITHUB_REF" == refs/heads/main || "$GITHUB_REF" == refs/heads/master ]]; then
            branch="${GITHUB_REF#refs/heads/}"
            raw="auto-${branch}-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
            needs_auto_tag=true
            should_release=true
          else
            raw="manual-${GITHUB_SHA::7}"
            needs_auto_tag=false
            should_release=false
          fi
          safe="$(echo "$raw" | tr '/ ' '-' | tr -cd '[:alnum:]._-')"
          echo "tag=${safe}" >> "$GITHUB_OUTPUT"
          echo "needs_auto_tag=${needs_auto_tag}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

      - name: Build deploy zip
        env:
          VERSION: ${{ steps.rel.outputs.tag }}
          GHCR_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          root="release-bundle"
          rm -rf "$root"
          mkdir -p "$root"

          cp docker-compose.yml "$root/"
          cp config.env.example "$root/"
          cp setup.ps1 "$root/"
          cp setup.sh "$root/"
          cp install.ps1 "$root/"
          cp install.sh "$root/"
          mkdir -p "$root/scripts"
          cp scripts/linux-host-mdns.sh "$root/scripts/linux-host-mdns.sh"
          cp deploy/README.md "$root/README.md"
          chmod +x "$root/scripts/linux-host-mdns.sh"
          chmod +x "$root/install.sh"

          sed -i "s/YOUR_GITHUB_USER/${GHCR_OWNER}/g" "$root/config.env.example"
          chmod +x "$root/setup.sh"

          zip_name="teslacam-viewer-${VERSION}.zip"
          (cd "$root" && zip -r "../${zip_name}" .)
          echo "ZIP_NAME=${zip_name}" >> "$GITHUB_ENV"
          ls -la "$zip_name"

      - name: Create auto tag
        if: steps.rel.outputs.needs_auto_tag == 'true'
        env:
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          set -euo pipefail
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG"

      - name: Create GitHub release
        if: steps.rel.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          name: TeslaCam Viewer ${{ steps.rel.outputs.tag }}
          prerelease: ${{ steps.rel.outputs.needs_auto_tag == 'true' }}
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}

      - name: Upload zip artifact (non-tag runs)
        if: steps.rel.outputs.should_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: teslacam-viewer-deploy-bundle
          path: ${{ env.ZIP_NAME }}
